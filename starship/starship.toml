# Starship configuration
# Prompt style:
#   в•ӯв”Җ пҢғ оӮ° пҖ• ~ оӮ°                                           оӮІ вң”
#   в•°в”Җ
#
# Requires a Nerd Font (e.g. JetBrains Mono Nerd Font)

add_newline = true

# в”Җв”Җ Format в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
format = """
в•ӯв”Җ$os$directory$fill$git_branch$git_status$status
в•°в”Җ$character"""

# в”Җв”Җ Right prompt в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# (status is already placed inline at the right side via $fill)

# в”Җв”Җ OS Icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
style = "fg:#7aa2f7 bg:#1a1b26"
format = "[ пҢғ ]($style)"

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style = "fg:#a9b1d6 bg:#1a1b26"
format = "[ оӮ°](fg:#7aa2f7 bg:#1a1b26)[ пҖ• $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "~"

# в”Җв”Җ Fill (pushes content to the right) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[fill]
symbol = " "

# в”Җв”Җ Git Branch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
style = "fg:#bb9af7 bg:#1a1b26"
format = "[ оӮ°](fg:#1a1b26 bg:#1a1b26)[ $branch ]($style)"

# в”Җв”Җ Git Status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_status]
style = "fg:#bb9af7 bg:#1a1b26"
format = "[$all_status$ahead_behind]($style)"
conflicted = "рҹҸі"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•${count}"
untracked = "?"
stashed = "рҹ“Ұ"
modified = "!"
staged = "+"
renamed = "В»"
deleted = "вңҳ"

# в”Җв”Җ Status (exit code) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[status]
disabled = false
style = "fg:#9ece6a bg:#1a1b26"
format = "[ оӮІ](fg:#1a1b26)[ вң” ](fg:#1a1b26 bg:#9ece6a)"
pipestatus = false
not_found_symbol = "вңҳ"
not_executable_symbol = "вңҳ"
sigint_symbol = "вңҳ"
signal_symbol = "вңҳ"
symbol = "вң”"
success_symbol = ""
# Show only on error
map_symbol = true

# в”Җв”Җ Character (input prompt) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[в•°в”Җ](bold green)"
error_symbol = "[в•°в”Җ](bold red)"
vicmd_symbol = "[в•°в”Җ](bold yellow)"

# в”Җв”Җ Hostname в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# (optional, uncomment if desired)
# [hostname]
# style = "fg:#a9b1d6 bg:#1a1b26"
# format = "[ оӮ°](fg:#7aa2f7)[ $hostname ]($style)"
# ssh_only = true
